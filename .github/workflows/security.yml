name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1' # Weekly scan on Mondays

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    name: GitLeaks Secret Scan
    uses: juninmd/base-actions/.github/workflows/reusable-security-scan.yml@main
